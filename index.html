<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xeroid Weather | Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Google Sans', 'sans-serif'] },
          colors: {
            lBg: '#f8fafc',
            lSurf: '#ffffff',
            lPrim: '#0061a4',
            dSurf: '#1e293b',
            dPrim: '#7dd3fc'
          }
        }
      }
    }
  </script>

  <style>
    /* Premium Blurs & Shadows */
    .glass { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
    .m3-hero { background: linear-gradient(135deg, #0061a4 0%, #004a7c 100%); }
    .dark .m3-hero { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
    
    .card-shadow { box-shadow: 0 4px 20px -4px rgba(0,0,0,0.05); }
    input::placeholder { font-weight: 500; opacity: 0.6; }
    
    /* Animation for smooth UI shifts */
    .fade-up { animation: fadeUp 0.6s cubic-bezier(0.2, 0, 0, 1) forwards; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body class="bg-lBg dark:bg-[#0b111e] text-slate-900 dark:text-slate-100 font-sans min-h-screen transition-colors duration-500">

  <header class="fixed top-0 left-0 right-0 p-4 z-50">
    <div class="max-w-xl mx-auto space-y-4">
        
        <div class="flex justify-between items-center px-2">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-lPrim dark:bg-dPrim rounded-2xl flex items-center justify-center text-white dark:text-slate-900 shadow-lg shadow-blue-500/20">
                    <span class="material-symbols-rounded">cloud_sync</span>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight leading-none">Xeroid</h1>
                    <p class="text-[10px] font-bold uppercase tracking-[0.2em] opacity-50">Weather Intelligence</p>
                </div>
            </div>
            
            <button onclick="toggleTheme()" class="w-12 h-12 bg-white/80 dark:bg-slate-800/80 glass rounded-2xl flex items-center justify-center border border-white/20 dark:border-slate-700/50 shadow-xl active:scale-95 transition-all">
                <span id="themeIcon" class="material-symbols-rounded text-lPrim dark:text-dPrim">dark_mode</span>
            </button>
        </div>

        <div class="relative group">
            <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-lPrim dark:group-focus-within:text-dPrim transition-colors">
                <span class="material-symbols-rounded">search</span>
            </div>
            <input id="cityInput" type="text" placeholder="Explore locations..." 
                class="w-full h-14 pl-12 pr-6 bg-white/80 dark:bg-slate-800/80 glass rounded-[24px] border border-white/20 dark:border-slate-700/50 shadow-xl outline-none focus:ring-4 ring-lPrim/10 dark:ring-dPrim/10 transition-all font-medium" />
            <div id="suggestions" class="absolute w-full mt-2 bg-white dark:bg-slate-800 rounded-[24px] shadow-2xl hidden overflow-hidden border border-slate-100 dark:border-slate-700"></div>
        </div>
        
    </div>
</header>

  <main class="max-w-xl mx-auto pt-[170px] px-4 pb-12 space-y-6">
    
    <section id="hero" class="m3-hero rounded-[40px] p-10 text-white shadow-2xl relative overflow-hidden">
      <div class="relative z-10 flex flex-col items-center">
        <div id="wIcon" class="text-[120px] leading-none mb-4 drop-shadow-2xl">☀️</div>
        <div class="text-center">
          <h2 id="temp" class="text-8xl font-bold tracking-tighter">--°</h2>
          <p id="cityName" class="text-2xl font-medium opacity-90">Discover the Skies</p>
          <div id="weatherDesc" class="mt-2 bg-white/20 backdrop-blur px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest">Awaiting Data</div>
        </div>
      </div>
      <div class="absolute -top-24 -right-24 w-64 h-64 bg-white/10 rounded-full blur-3xl"></div>
      <div class="absolute -bottom-24 -left-24 w-64 h-64 bg-lPrim/20 rounded-full blur-3xl"></div>
    </section>

    <section class="grid grid-cols-2 gap-4 fade-up">
      <div class="bg-white dark:bg-slate-800 p-6 rounded-[32px] border border-slate-100 dark:border-slate-700/50 card-shadow">
        <div class="flex items-center gap-3 mb-4">
          <div class="p-2 bg-sky-100 dark:bg-sky-500/20 rounded-xl">
            <span class="material-symbols-rounded text-sky-600 dark:text-sky-300">humidity_low</span>
          </div>
          <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Humidity</span>
        </div>
        <p id="hum" class="text-3xl font-bold">--</p>
      </div>

      <div class="bg-white dark:bg-slate-800 p-6 rounded-[32px] border border-slate-100 dark:border-slate-700/50 card-shadow">
        <div class="flex items-center gap-3 mb-4">
          <div class="p-2 bg-amber-100 dark:bg-amber-500/20 rounded-xl">
            <span class="material-symbols-rounded text-amber-600 dark:text-amber-300">air</span>
          </div>
          <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Wind</span>
        </div>
        <p id="win" class="text-3xl font-bold">--</p>
      </div>
    </section>

    <section class="bg-white dark:bg-slate-800 rounded-[32px] p-6 border border-slate-100 dark:border-slate-700/50 card-shadow fade-up" style="animation-delay: 0.1s">
        <div class="flex justify-between items-center py-3 border-b border-slate-50 dark:border-slate-700/50">
            <div class="flex items-center gap-3">
                <span class="material-symbols-rounded text-slate-400">visibility</span>
                <span class="text-sm font-semibold">Visibility</span>
            </div>
            <span id="vis" class="font-bold">--</span>
        </div>
        <div class="flex justify-between items-center py-3 border-b border-slate-50 dark:border-slate-700/50">
            <div class="flex items-center gap-3">
                <span class="material-symbols-rounded text-slate-400">wb_twilight</span>
                <span class="text-sm font-semibold">Sunset</span>
            </div>
            <span id="set" class="font-bold">--</span>
        </div>
        <div class="flex justify-between items-center py-3">
            <div class="flex items-center gap-3">
                <span class="material-symbols-rounded text-slate-400">thermostat</span>
                <span class="text-sm font-semibold">Feels Like</span>
            </div>
            <span id="feels" class="font-bold">--</span>
        </div>
    </section>

    <section id="nearSection" class="hidden fade-up" style="animation-delay: 0.2s">
      <h3 class="px-4 mb-4 text-xs font-bold uppercase text-slate-400 tracking-[0.2em]">Regional Sites</h3>
      <div id="nearList" class="space-y-3"></div>
    </section>

  </main>

  <script>
    const apiKey = "425007d8aa0a9bbadf5a7b8524e40b4f";

    // --- Core Logic Refined ---
    function toggleTheme() {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      document.getElementById('themeIcon').innerText = isDark ? 'light_mode' : 'dark_mode';
    }

    const input = document.getElementById('cityInput');
    const suggestions = document.getElementById('suggestions');

    input.addEventListener('input', async () => {
      const q = input.value;
      if (q.length < 3) { suggestions.classList.add('hidden'); return; }
      
      try {
        const res = await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=${q}&limit=5&appid=${apiKey}`);
        const data = await res.json();
        suggestions.innerHTML = data.map(c => `
          <div onclick="fetchWeather('${c.name}', ${c.lat}, ${c.lon})" class="px-6 py-4 hover:bg-slate-50 dark:hover:bg-slate-700/50 cursor-pointer flex justify-between items-center transition-colors">
            <span class="font-semibold text-sm">${c.name}, <span class="opacity-50 text-xs">${c.country}</span></span>
            <span class="material-symbols-rounded text-slate-300 text-sm">north_east</span>
          </div>
        `).join('');
        suggestions.classList.remove('hidden');
      } catch (e) { console.error("Geo search failed"); }
    });

    async function fetchWeather(name, lat, lon) {
      input.value = name;
      suggestions.classList.add('hidden');
      
      const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${apiKey}`);
      const data = await res.json();
      
      const icons = { "Clear": "☀️", "Clouds": "☁️", "Rain": "🌧️", "Drizzle": "🌦️", "Thunderstorm": "⛈️", "Snow": "❄️", "Mist": "🌫️" };
      
      // Update DOM with polished selectors
      document.getElementById('wIcon').innerText = icons[data.weather[0].main] || "🌡️";
      document.getElementById('temp').innerText = `${Math.round(data.main.temp)}°`;
      document.getElementById('cityName').innerText = data.name;
      document.getElementById('weatherDesc').innerText = data.weather[0].description;
      document.getElementById('hum').innerText = `${data.main.humidity}%`;
      document.getElementById('win').innerText = `${data.wind.speed}m/s`;
      document.getElementById('vis').innerText = `${(data.visibility/1000).toFixed(1)} km`;
      document.getElementById('feels').innerText = `${Math.round(data.main.feels_like)}°`;
      document.getElementById('set').innerText = new Date(data.sys.sunset * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      fetchNearby(lat, lon);
      document.getElementById('nearSection').classList.remove('hidden');
    }

    async function fetchNearby(lat, lon) {
      const res = await fetch(`https://api.openweathermap.org/geo/1.0/reverse?lat=${lat}&lon=${lon}&limit=5&appid=${apiKey}`);
      const data = await res.json();
      document.getElementById('nearList').innerHTML = data.slice(1).map(p => `
        <button onclick="fetchWeather('${p.name}', ${p.lat}, ${p.lon})" class="w-full p-5 bg-white dark:bg-slate-800 rounded-3xl font-semibold flex justify-between items-center hover:ring-2 ring-lPrim transition-all card-shadow">
          <span class="flex items-center gap-3">
             <span class="material-symbols-rounded text-slate-300">location_on</span>
             ${p.name}
          </span>
          <span class="material-symbols-rounded text-slate-400">chevron_right</span>
        </button>
      `).join('');
    }
  </script>
</body>
</html>
